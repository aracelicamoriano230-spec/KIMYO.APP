name: KimYo 5V APK Compiler

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build & Packages Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository source
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Set up Gradle Build Cache
      uses: gradle/actions/setup-gradle@v3

    # If the repository is imported without a Gradle wrapper, generate it automatically
    - name: Ensure Gradle Wrapper is populated
      run: |
        if [ ! -f "gradlew" ]; then
          echo "No gradlew wrapper detected. Building one via gradle wrapper task..."
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Compile & Assemble Debug APK
      run: ./gradlew :app:assembleDebug --stacktrace

    - name: Upload Installer APK Graphic Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KimYo5V-BetaV1-installer-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 14
